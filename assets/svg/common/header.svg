<!-- Common Top Header with gold underline and status texts -->
<g transform="translate(60, 45)" opacity="{{HEADER_OPACITY}}">
  <text x="0" y="20" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="900" letter-spacing="4">{{HEADER_LEFT}}</text>
  <text x="360" y="18" fill="#ecc67a" font-family="monospace" font-size="12" opacity="0.5">|</text>
  <text x="380" y="18" fill="#7bf7ff" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="800">{{HEADER_RIGHT}}</text>
  <line x1="0" y1="35" x2="1080" y2="35" stroke="url(#hoyoGold)" stroke-width="1.2" opacity="0.4"/>
  <rect x="0" y="34" width="100" height="3" fill="url(#hoyoGold)"/>
</g>
