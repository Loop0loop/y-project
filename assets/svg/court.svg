<!-- ZZZ Explorer HUD Components for Court battle Screen -->

<!-- Left Top Status Badge (ZZZ New Eridu Style) -->
<g transform="translate(40, 30)">
  <rect x="0" y="0" width="240" height="64" rx="32" fill="#1b1c22" stroke="#2d2f39" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" fill="#000000"/>
  <path d="M 24 26 L 32 20 L 40 26 V 38 L 32 44 L 24 38 Z" fill="#ffffff"/>
  <polygon points="32,24 36,32 32,30 28,32" fill="#ffa500"/>

  <text x="68" y="28" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="16" font-weight="900" letter-spacing="1">ME WEEK 0{{WEEK}}</text>
  <text x="68" y="46" fill="#a4a6b0" font-family="'Outfit', sans-serif" font-size="11" font-weight="700">AM Fontaine</text>
</g>

<!-- Quest Checklist (Under top-left badge) -->
<g transform="translate(40, 115)">
  <g transform="translate(0, 0)">
    <circle cx="12" cy="12" r="10" fill="#ffa500"/>
    <text x="12" y="16" fill="#000000" font-family="sans-serif" font-size="13" font-weight="900" text-anchor="middle">!</text>
    
    <text x="30" y="16" fill="#ffffff" font-family="'Malgun Gothic', sans-serif" font-size="13" font-weight="800">푸리나 무죄 입증하기</text>
    <text x="30" y="32" fill="#a4a6b0" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="500">법정 공방의 모순점을 포착하자</text>
  </g>

  <g transform="translate(0, 48)">
    <circle cx="12" cy="12" r="10" fill="#00e4ff"/>
    <circle cx="12" cy="12" r="5" fill="#000000"/>
    
    <text x="30" y="16" fill="#ffffff" font-family="'Malgun Gothic', sans-serif" font-size="13" font-weight="800">변론 공방 진행률: {{PROGRESS_LABEL}}</text>
    <text x="30" y="32" fill="#a4a6b0" font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="500">상대 검사와의 판세를 확인하자</text>
  </g>
</g>

<!-- Right Top Action menu shortcuts (Settings, Keyboard, Z!, Gift) -->
<g transform="translate(900, 30)">
  <g transform="translate(0, 0)">
    <circle cx="20" cy="20" r="16" fill="#1b1c22" stroke="#2d2f39" stroke-width="1"/>
    <path d="M 14 16 L 24 16 L 21 13 M 24 16 L 21 19" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-2" y="38" width="44" height="15" rx="3" fill="#000000"/>
    <text x="20" y="49" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">Esc</text>
  </g>

  <g transform="translate(55, 0)">
    <circle cx="20" cy="20" r="16" fill="#1b1c22" stroke="#2d2f39" stroke-width="1"/>
    <path d="M 12 12 H 28 V 28 H 12 Z M 16 16 H 24 M 16 20 H 24 M 16 24 H 24" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="-2" y="38" width="44" height="15" rx="3" fill="#000000"/>
    <text x="20" y="49" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">&gt;</text>
  </g>

  <g transform="translate(110, 0)">
    <circle cx="20" cy="20" r="16" fill="#1b1c22" stroke="#2d2f39" stroke-width="1"/>
    <text x="20" y="26" fill="#ffffff" font-family="'Arial Black', sans-serif" font-size="15" font-weight="900" text-anchor="middle">Z!</text>
    <rect x="-2" y="38" width="44" height="15" rx="3" fill="#000000"/>
    <text x="20" y="49" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">Z</text>
  </g>

  <g transform="translate(165, 0)">
    <circle cx="20" cy="20" r="16" fill="#1b1c22" stroke="#2d2f39" stroke-width="1"/>
    <path d="M 12 14 H 28 V 28 H 12 Z M 12 18 H 28 M 20 14 V 28" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="-2" y="38" width="44" height="15" rx="3" fill="#000000"/>
    <text x="20" y="49" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">Tab</text>
  </g>
</g>

<!-- Center Character Port Viewports (Gascii Slot) -->
<g transform="translate(300, 100)">
  <rect x="0" y="0" width="280" height="260" rx="10" fill="#071221" fill-opacity="0.4" stroke="url(#zzzCyan)" stroke-width="1.5"/>
  <text x="140" y="130" fill="#00e4ff" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" opacity="0.3">[ GASCII: FURINA ]</text>
  <rect x="15" y="235" width="250" height="8" rx="4" fill="#142438"/>
  <rect x="15" y="235" width="{{BAR_ALLY_HP_WIDTH}}" height="8" rx="4" fill="url(#zzzCyan)" filter="url(#softGlow)"/>
  <text x="15" y="228" fill="#00e4ff" font-family="monospace" font-size="10" font-weight="900">HP {{ALLY_HP}}%</text>

  <rect x="320" y="0" width="280" height="260" rx="10" fill="#200814" fill-opacity="0.4" stroke="url(#zzzRed)" stroke-width="1.5"/>
  <text x="460" y="130" fill="#ff005b" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" opacity="0.3">[ GASCII: PROSECUTOR ]</text>
  <rect x="335" y="235" width="250" height="8" rx="4" fill="#32111d"/>
  <rect x="335" y="235" width="{{BAR_ENEMY_HP_WIDTH}}" height="8" rx="4" fill="url(#zzzRed)" filter="url(#softGlow)"/>
  <text x="335" y="228" fill="#ff005b" font-family="monospace" font-size="10" font-weight="900">HP {{ENEMY_HP}}%</text>
</g>

<!-- Trial Momentum Slider HUD (Under Viewports) -->
<g transform="translate(300, 385)">
  <rect x="0" y="0" width="600" height="8" rx="4" fill="#1b1c22" stroke="url(#zzzGold)" stroke-width="0.5"/>
  <rect x="{{BAR_MOMENTUM_X}}" y="-4" width="30" height="16" rx="4" fill="url(#zzzGold)" filter="url(#softGlow)"/>
  <text x="300" y="-10" fill="#fff05a" font-family="'Outfit', sans-serif" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="2">TRIAL MOMENTUM: {{MOMENTUM}}</text>
</g>

<!-- Bottom Left: Chat Log dialogue box -->
<g transform="translate(40, 480)">
  <rect x="0" y="0" width="780" height="150" rx="12" fill="url(#glassBase)" stroke="url(#zzzGold)" stroke-width="1.2"/>
  <rect x="0" y="0" width="6" height="150" fill="url(#zzzGold)"/>
  
  <g transform="translate(25, -16)">
    <path d="M 0 0 H 120 L 140 32 H -10 Z" fill="#181a24" stroke="url(#zzzGold)" stroke-width="1.5"/>
    <text x="55" y="20" fill="#fff05a" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle">법정 기록</text>
  </g>

  <text x="25" y="45" fill="#ffffff" font-family="'Outfit', 'Malgun Gothic', sans-serif" font-size="17" font-weight="800">{{BODY}}</text>
  <text x="25" y="80" fill="#00e4ff" font-family="'Outfit', 'Malgun Gothic', sans-serif" font-size="12" font-weight="600" opacity="0.7">역사 피드: {{SIDE_BODY}}</text>
  <text x="25" y="125" fill="#ffa500" font-family="monospace" font-size="11">{{SUBTITLE}}</text>
</g>

<!-- Right Bottom: ZZZ skill panel layout overlay -->
<g transform="translate(900, 440)">
  <g transform="translate(180, 110)">
    <circle cx="35" cy="35" r="35" fill="#1b1c22" stroke="#ffffff" stroke-width="2.5" filter="url(#softGlow)"/>
    <circle cx="35" cy="35" r="28" fill="#ffa500" opacity="0.1"/>
    <path d="M 23 30 H 47 V 44 H 35 L 28 50 V 44 H 23 Z" fill="#ffffff"/>
    <circle cx="35" cy="85" r="10" fill="#000000"/>
    <text x="35" y="89" fill="#ffffff" font-family="monospace" font-size="11" font-weight="900" text-anchor="middle">Q</text>
  </g>

  <g transform="translate(90, 110)">
    <circle cx="30" cy="30" r="30" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1.5"/>
    <path d="M 20 22 H 40 M 24 22 V 38 H 36 V 22 M 30 22 V 42" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="30" cy="72" r="9" fill="#000000"/>
    <text x="30" y="76" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">E</text>
  </g>

  <g transform="translate(15, 110)">
    <circle cx="28" cy="28" r="28" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1.5"/>
    <path d="M 18 32 L 28 22 L 38 32 M 18 24 L 28 14 L 38 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="28" cy="68" r="9" fill="#000000"/>
    <text x="28" y="72" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">C</text>
  </g>

  <g transform="translate(-50, 110)">
    <circle cx="28" cy="28" r="28" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="28" cy="28" r="4" fill="#ffffff"/>
    <circle cx="28" cy="68" r="9" fill="#000000"/>
    <text x="28" y="72" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">F</text>
  </g>

  <g transform="translate(180, 30)">
    <circle cx="24" cy="24" r="24" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1"/>
    <rect x="15" y="15" width="18" height="18" fill="none" stroke="#ffffff" stroke-width="2" rx="2"/>
    <rect x="19" y="19" width="4" height="4" fill="#ffffff"/>
    <rect x="25" y="19" width="4" height="4" fill="#ffffff"/>
    <rect x="19" y="25" width="4" height="4" fill="#ffffff"/>
    <rect x="25" y="25" width="4" height="4" fill="#ffffff"/>
    <circle cx="24" cy="58" r="9" fill="#000000"/>
    <text x="24" y="62" fill="#ffffff" font-family="monospace" font-size="10" font-weight="900" text-anchor="middle">M</text>
  </g>

  <g transform="translate(90, 35)">
    <circle cx="22" cy="22" r="22" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1"/>
    <polygon points="15,15 15,29 24,22" fill="#ffffff"/>
    <polygon points="24,15 24,29 33,22" fill="#ffffff"/>
    <circle cx="22" cy="54" r="8" fill="#000000"/>
    <text x="22" y="58" fill="#ffffff" font-family="monospace" font-size="9" font-weight="900" text-anchor="middle">»</text>
  </g>

  <g transform="translate(15, 40)">
    <circle cx="20" cy="20" r="20" fill="#1b1c22" stroke="#a4a6b0" stroke-width="1"/>
    <circle cx="20" cy="20" r="10" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="20" y1="5" x2="20" y2="35" stroke="#ffffff" stroke-width="1"/>
    <line x1="5" y1="20" x2="35" y2="20" stroke="#ffffff" stroke-width="1"/>
    <circle cx="20" cy="50" r="8" fill="#000000"/>
    <text x="20" y="54" fill="#ffffff" font-family="monospace" font-size="9" font-weight="900" text-anchor="middle">.</text>
  </g>
</g>

<!-- Giant Fontaine "OBJECTION!" ("이의있소!") Overlay bubble badge -->
<g transform="translate(600, 260)" opacity="{{OBJECTION_OPACITY}}">
  <rect x="-220" y="-55" width="440" height="110" rx="15" ry="15" fill="#9d1c3a" stroke="url(#zzzGold)" stroke-width="3.5" filter="url(#softGlow)"/>
  <rect x="-212" y="-47" width="424" height="94" rx="11" ry="11" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <polygon points="-20,55 0,72 20,55" fill="#9d1c3a" stroke="url(#zzzGold)" stroke-width="2"/>
  <text x="0" y="12" fill="#ffffff" font-family="'Outfit', 'Arial Black', sans-serif" font-size="44" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#softGlow)">이의있소!</text>
  <text x="0" y="38" fill="#ecc67a" font-family="sans-serif" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="3">OBJECTION!</text>
</g>
