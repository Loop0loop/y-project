<svg width="{{WIDTH}}" height="{{HEIGHT}}" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shared Gradients, Filters, and Patterns -->
    <linearGradient id="mainBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040a16"/>
      <stop offset="60%" stop-color="#0b172a"/>
      <stop offset="100%" stop-color="#121026"/>
    </linearGradient>

    <linearGradient id="hoyoPanelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091829" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0e2338" stop-opacity="0.90"/>
    </linearGradient>

    <linearGradient id="hoyoGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c59f51"/>
      <stop offset="50%" stop-color="#ecc67a"/>
      <stop offset="100%" stop-color="#a47d34"/>
    </linearGradient>

    <linearGradient id="cyanStat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00beff"/>
      <stop offset="100%" stop-color="#a3f2ff"/>
    </linearGradient>

    <linearGradient id="zzzCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>

    <linearGradient id="zzzRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff005b"/>
      <stop offset="100%" stop-color="#9a0036"/>
    </linearGradient>

    <linearGradient id="staminaBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffd2"/>
      <stop offset="50%" stop-color="#00ff66"/>
      <stop offset="75%" stop-color="#e1ff00"/>
      <stop offset="100%" stop-color="#9d3c0a"/>
    </linearGradient>

    <linearGradient id="glassBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#050a12" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="hoyoDialogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1728" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="0.90"/>
    </linearGradient>

    <pattern id="starryPoints" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.8" fill="#ecc67a" opacity="0.12"/>
      <circle cx="35" cy="25" r="0.5" fill="#7bf7ff" opacity="0.08"/>
    </pattern>

    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
    </pattern>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Common Background & Frame -->
  <rect width="1200" height="675" fill="url(#mainBg)"/>
  <rect width="1200" height="675" fill="url(#starryPoints)"/>
  <rect x="25" y="25" width="1150" height="625" fill="none" stroke="url(#hoyoGold)" stroke-width="1.2" rx="10" opacity="0.25"/>
  <path d="M 20 60 L 20 20 L 60 20" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 1180 60 L 1180 20 L 1140 20" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 20 615 L 20 655 L 60 655" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 1180 615 L 1180 655 L 1140 655" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>

  <!-- Dating screen content -->
  <!-- Video Viewport / 3D Render Frame (Top 70%) -->
  <g transform="translate(60, 95)">
    <rect x="0" y="0" width="1080" height="345" rx="10" fill="#071221" fill-opacity="0.4" stroke="url(#hoyoGold)" stroke-width="1.5"/>
    
    <path d="M 15 20 L 35 20 M 15 20 L 15 40" fill="none" stroke="url(#hoyoGold)" stroke-width="2" opacity="0.8"/>
    <path d="M 1065 20 L 1045 20 M 1065 20 L 1065 40" fill="none" stroke="url(#hoyoGold)" stroke-width="2" opacity="0.8"/>
    <path d="M 15 325 L 35 325 M 15 325 L 15 305" fill="none" stroke="url(#hoyoGold)" stroke-width="2" opacity="0.8"/>
    <path d="M 1065 325 L 1045 325 M 1065 325 L 1065 305" fill="none" stroke="url(#hoyoGold)" stroke-width="2" opacity="0.8"/>
    
    <rect x="25" y="25" width="1030" height="295" rx="8" fill="#040914" fill-opacity="0.75" stroke="#1a354f" stroke-width="1" stroke-dasharray="8 6"/>
    <text x="540" y="170" fill="#ecc67a" font-family="monospace" font-size="15" font-weight="700" text-anchor="middle" opacity="0.35">[ TERMPLAY 3D VIDEO / WIREFRAME VIEWPORT: FURINA ]</text>
    
    <circle cx="50" cy="50" r="5" fill="#00ffc4" filter="url(#softGlow)"/>
    <text x="65" y="54" fill="#ffffff" font-family="monospace" font-size="11" font-weight="700" opacity="0.8">AI STREAM ON</text>
  </g>

  <!-- Genshin dialogue Box (Bottom 30%) -->
  <g transform="translate(60, 465)">
    <rect x="0" y="0" width="1080" height="145" rx="12" fill="url(#hoyoDialogBg)" stroke="url(#hoyoGold)" stroke-width="1.2"/>
    <rect x="0" y="0" width="6" height="145" fill="url(#hoyoGold)"/>

    <g transform="translate(40, -16)">
      <path d="M 0 0 H 130 L 150 34 H -10 Z" fill="#080e1a" stroke="url(#hoyoGold)" stroke-width="1.5"/>
      <text x="60" y="22" fill="#ecc67a" font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="900" text-anchor="middle" letter-spacing="1">Furina</text>
      <polygon points="120,11 124,15 120,19 116,15" fill="#00ffc4" filter="url(#softGlow)"/>
    </g>

    <text x="40" y="50" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="600" opacity="0.95">{{BODY}}</text>

    <polygon points="1040,110 1044,116 1040,122 1036,116" fill="#ecc67a" stroke="#ffffff" stroke-width="0.8"/>

    <g transform="translate(40, 95)">
      <line x1="0" y1="0" x2="960" y2="0" stroke="url(#hoyoGold)" stroke-width="0.8" opacity="0.25"/>
      <path d="M 0 10 L 8 18 L 0 26 M 6 18 H 15" fill="none" stroke="url(#hoyoGold)" stroke-width="2"/>
      <text x="25" y="23" fill="#7bf7ff" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700">{{SIDE_BODY}}</text>
      <text x="960" y="23" fill="#ecc67a" font-family="monospace" font-size="11" text-anchor="end" opacity="0.5">Prompt input console</text>
    </g>
  </g>
</svg>
