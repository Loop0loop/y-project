<svg width="{{WIDTH}}" height="{{HEIGHT}}" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shared Gradients, Filters, and Patterns -->
    <linearGradient id="mainBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040a16"/>
      <stop offset="60%" stop-color="#0b172a"/>
      <stop offset="100%" stop-color="#121026"/>
    </linearGradient>

    <linearGradient id="hoyoPanelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091829" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0e2338" stop-opacity="0.90"/>
    </linearGradient>

    <linearGradient id="hoyoGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c59f51"/>
      <stop offset="50%" stop-color="#ecc67a"/>
      <stop offset="100%" stop-color="#a47d34"/>
    </linearGradient>

    <!-- Aliases for missing IDs -->
    <linearGradient id="zzzGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c59f51"/>
      <stop offset="50%" stop-color="#ecc67a"/>
      <stop offset="100%" stop-color="#a47d34"/>
    </linearGradient>
    
    <linearGradient id="goldBanner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c59f51"/>
      <stop offset="50%" stop-color="#ecc67a"/>
      <stop offset="100%" stop-color="#a47d34"/>
    </linearGradient>

    <linearGradient id="cyanStat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00beff"/>
      <stop offset="100%" stop-color="#a3f2ff"/>
    </linearGradient>

    <linearGradient id="zzzCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>

    <linearGradient id="zzzRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff005b"/>
      <stop offset="100%" stop-color="#9a0036"/>
    </linearGradient>

    <linearGradient id="staminaBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffd2"/>
      <stop offset="50%" stop-color="#00ff66"/>
      <stop offset="75%" stop-color="#e1ff00"/>
      <stop offset="100%" stop-color="#9d3c0a"/>
    </linearGradient>

    <linearGradient id="glassBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#050a12" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="glassOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#050a12" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="hoyoDialogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1728" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="0.90"/>
    </linearGradient>

    <pattern id="starryPoints" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.8" fill="#ecc67a" opacity="0.12"/>
      <circle cx="35" cy="25" r="0.5" fill="#7bf7ff" opacity="0.08"/>
    </pattern>

    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
    </pattern>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Common Background & Frame -->
  <rect width="1200" height="675" fill="url(#mainBg)"/>
  <rect width="1200" height="675" fill="url(#starryPoints)"/>
  <rect x="25" y="25" width="1150" height="625" fill="none" stroke="url(#hoyoGold)" stroke-width="1.2" rx="10" opacity="0.25"/>
  <path d="M 20 60 L 20 20 L 60 20" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 1180 60 L 1180 20 L 1140 20" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 20 615 L 20 655 L 60 655" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>
  <path d="M 1180 615 L 1180 655 L 1140 655" fill="none" stroke="url(#hoyoGold)" stroke-width="2.5" opacity="0.7"/>

  <!-- Result Screen Content -->
  <!-- Giant Result Badge Banner -->
  <g transform="translate(600, 150)">
    <text x="0" y="0" fill="#ffffff" font-family="'Outfit', 'Arial Black', sans-serif" font-size="42" font-weight="900" text-anchor="middle" letter-spacing="8" filter="url(#softGlow)">{{TITLE}}</text>
    <text x="0" y="32" fill="#ecc67a" font-family="'Outfit', sans-serif" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="3">{{SUBTITLE}}</text>
    <path d="M -200 50 L 200 50" stroke="url(#hoyoGold)" stroke-width="2"/>
    <circle cx="0" cy="50" r="4" fill="#ffffff" filter="url(#softGlow)"/>
  </g>

  <!-- Central Info Display Card -->
  <g transform="translate(250, 240)">
    <rect x="0" y="0" width="700" height="280" rx="12" fill="url(#hoyoPanelBg)" stroke="url(#hoyoGold)" stroke-width="1.5"/>
    <rect x="0" y="0" width="8" height="280" fill="url(#hoyoGold)"/>

    <!-- Left side: Stat Recap -->
    <g transform="translate(50, 40)">
      <text x="0" y="20" fill="#ecc67a" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" letter-spacing="2">FINALIZED ADVOCATE STATS</text>
      
      <g transform="translate(0, 45)">
        <text x="0" y="15" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">LOGIC SPEED:</text>
        <text x="220" y="15" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{STAT_LOGIC}}</text>

        <text x="0" y="45" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">MENTAL STAMINA:</text>
        <text x="220" y="15" dy="30" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{STAT_MENTAL}}</text>

        <text x="0" y="75" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">SPEECH POWER:</text>
        <text x="220" y="15" dy="60" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{STAT_SPEECH}}</text>

        <text x="0" y="105" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">GUTS INDEX:</text>
        <text x="220" y="15" dy="90" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{STAT_GUTS}}</text>

        <text x="0" y="135" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">LAW KNOWLEDGE:</text>
        <text x="220" y="15" dy="120" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{STAT_INTELLECT}}</text>
      </g>
    </g>

    <!-- Right side: Session summary -->
    <g transform="translate(380, 40)">
      <text x="0" y="20" fill="#ecc67a" font-family="'Outfit', sans-serif" font-size="16" font-weight="800" letter-spacing="2">SESSION METRICS</text>
      
      <g transform="translate(0, 45)">
        <text x="0" y="15" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">TRIAL WEEKS RUN:</text>
        <text x="180" y="15" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">0{{WEEK}}</text>

        <text x="0" y="55" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">TRANSCRIPT LENGTH:</text>
        <text x="180" y="55" fill="#ffffff" font-family="monospace" font-size="14" font-weight="700">{{BODY}} lines</text>

        <text x="0" y="95" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">ADVOCATE PROCESS:</text>
        <text x="180" y="95" fill="#00ffc4" font-family="monospace" font-size="14" font-weight="700" filter="url(#softGlow)">SUCCESS</text>

        <text x="0" y="135" fill="#7bf7ff" font-family="'Outfit', sans-serif" font-size="13" font-weight="700">SESSION SYSTEM:</text>
        <text x="180" y="135" fill="#ffffff" font-family="monospace" font-size="13" opacity="0.7">MVP COMPLETE</text>
      </g>
    </g>
  </g>
</svg>
